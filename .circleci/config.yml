# PHP CircleCI 2.1 configuration file
#
# Check https://circleci.com/docs/configuration-reference/ for more details.
version: 2.1

jobs:
  test:
    docker:
      - image: cimg/php:8.4
      - image: cimg/mysql:8.0
        environment:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_USER: sail
          MYSQL_DATABASE: type_89
          MYSQL_PASSWORD: 'password'

    steps:
      - checkout

      - run:
          name: Install pcov (skip if already loaded)
          command: |
            # cimg/php images may bundle pcov; install only when missing.
            if ! php -m | grep -qi '^pcov$'; then
              sudo pecl install pcov
              PHP_INI_DIR=$(php -r 'echo PHP_CONFIG_FILE_SCAN_DIR;')
              echo 'extension=pcov.so' | sudo tee "${PHP_INI_DIR}/pcov.ini"
            fi

      - run:
          name: Setup environment
          command: cp .env.ci .env

      - restore_cache:
          keys:
            - composer-v3-{{ checksum "composer.lock" }}
            - composer-v3-

      - run:
          name: Install Composer dependencies
          command: composer install -n --prefer-dist --no-progress

      - save_cache:
          key: composer-v3-{{ checksum "composer.lock" }}
          paths:
            - vendor

      - run:
          name: Wait for MySQL
          command: dockerize -wait tcp://127.0.0.1:3306 -timeout 60s

      - run:
          name: Migrate (MySQL smoke test)
          command: php artisan migrate --force

      - run:
          name: Static analysis and coding standards
          command: composer build

      - run:
          name: Run PHPUnit with coverage
          command: php -d pcov.enabled=1 ./vendor/bin/phpunit --coverage-html /tmp/build/coverage

      - store_artifacts:
          path: /tmp/build
          destination: build

workflows:
  build-and-test:
    jobs:
      - test
