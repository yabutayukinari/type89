name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP ${{ matrix.php }} (analysis & tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_USER: sail
          MYSQL_PASSWORD: password
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc # 2.37.1
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, intl, pdo_mysql, pdo_sqlite, sqlite3, bcmath
          coverage: pcov
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-${{ matrix.php }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-${{ matrix.php }}-composer-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Audit composer dependencies for known vulnerabilities
        run: composer audit --locked

      - name: Prepare environment (.env, .env.testing)
        run: |
          cp .env.example .env
          cp .env.example .env.testing
          sed -i 's|^APP_ENV=.*|APP_ENV=testing|' .env .env.testing
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env .env.testing
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=testing|' .env .env.testing
          php artisan key:generate --force
          php artisan key:generate --env=testing --force

      - name: Run static analysis (csf, cs, sa, md)
        run: composer build

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 --silent; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL... ($i)"
            sleep 2
          done
          echo "MySQL did not become ready in time" >&2
          exit 1

      - name: Migrate (MySQL smoke test)
        run: php artisan migrate --force

      - name: Run PHPUnit with coverage
        run: |
          mkdir -p build/coverage
          php -d pcov.enabled=1 ./vendor/bin/phpunit \
            --coverage-html build/coverage/html \
            --coverage-clover build/coverage/clover.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: build/coverage/clover.xml
          flags: php
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-php-${{ matrix.php }}
          path: build/coverage
          retention-days: 14

  frontend:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install npm dependencies
        run: npm ci

      - name: Audit npm dependencies for known vulnerabilities
        # high+ only — moderate/low transitive npm advisories are too noisy to gate PRs on
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
