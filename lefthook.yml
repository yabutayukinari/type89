pre-commit:
  parallel: true
  commands:
    php-cs-fixer:
      glob: "*.php"
      run: ./vendor/bin/sail bin php-cs-fixer fix --config=.php-cs-fixer.dist.php {staged_files}
      stage_fixed: true
    phpcs:
      glob: "*.php"
      run: ./vendor/bin/sail bin phpcs --standard=phpcs.xml {staged_files}

pre-push:
  commands:
    composer-build:
      run: ./vendor/bin/sail composer build
