coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
        if_ci_failed: error
    patch:
      default:
        target: 80%
        threshold: 0%
        if_ci_failed: error

comment:
  layout: "diff, flags, files"
  behavior: default
  require_changes: false

ignore:
  - "tests"
  - "database/migrations"
  - "database/seeders"
  - "database/factories"
  - "config"
  - "bootstrap"
  - "public"
  - "resources"
  - "routes"
  - "storage"
  - "vendor"
